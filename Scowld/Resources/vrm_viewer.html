<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
canvas { display: block; width: 100%; height: 100%; }
#loader {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; font-family: -apple-system, sans-serif; color: rgba(255,255,255,0.6);
}
#loader .spinner {
    width: 36px; height: 36px; margin: 0 auto 12px;
    border: 3px solid rgba(255,165,0,0.2); border-top-color: rgba(255,165,0,0.8);
    border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader .status { font-size: 13px; }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><div class="status" id="status">Loading 3D engine...</div></div>

<script>
function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRM from '@pixiv/three-vrm';

setStatus('Engine loaded. Waiting for model...');

// ─── Scene ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(22, window.innerWidth / window.innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

// ─── Lighting ───
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
var mainLight = new THREE.DirectionalLight(0xffeedd, 1.3);
mainLight.position.set(1, 2, 3);
scene.add(mainLight);
var fillLight = new THREE.DirectionalLight(0xddeeff, 0.5);
fillLight.position.set(-1, 1, -1);
scene.add(fillLight);
var rimLight = new THREE.DirectionalLight(0xffaa66, 0.4);
rimLight.position.set(0, 0.5, -2);
scene.add(rimLight);

// ─── State ───
var currentVRM = null;
var clock = new THREE.Clock();
var t = 0; // global time for animations

// Targets (set from Swift)
var targetMouth = 0;
var targetBlinkL = 0, targetBlinkR = 0;
var targetLookX = 0, targetLookY = 0;
var targetHeadYaw = 0, targetHeadPitch = 0;
var targetBodyBounce = 0;
var emotionTargets = {};

// Auto-blink state (JS-driven for smooth idle)
var nextBlinkTime = 2 + Math.random() * 3;
var blinkPhase = 0; // 0=open, 1=closing, 2=opening
var blinkValue = 0;
var externalBlink = false; // true when Swift controls blink

function sendEvent(obj) {
    try { window.webkit.messageHandlers.vrmEvent.postMessage(JSON.stringify(obj)); } catch(e) {}
}

// ─── Pose helper: find bone by traversing scene ───
function findBoneByName(scene, name) {
    var found = null;
    scene.traverse(function(obj) {
        if (obj.isBone && obj.name && obj.name.toLowerCase().indexOf(name.toLowerCase()) >= 0) {
            found = obj;
        }
    });
    return found;
}

// Store original (rest) quaternions for each bone so we can add relative rotations
var restQuaternions = {};
var boneRefs = {};

function captureRestPose(vrm) {
    var humanoid = vrm.humanoid;
    if (!humanoid) return;

    var names = [
        'hips', 'spine', 'chest', 'upperChest', 'neck', 'head',
        'leftShoulder', 'leftUpperArm', 'leftLowerArm', 'leftHand',
        'rightShoulder', 'rightUpperArm', 'rightLowerArm', 'rightHand'
    ];

    for (var i = 0; i < names.length; i++) {
        var n = names[i];
        var bone = humanoid.getRawBoneNode(n);
        if (bone) {
            boneRefs[n] = bone;
            restQuaternions[n] = bone.quaternion.clone();
            console.log('Bone: ' + n + ' = ' + bone.name);
        }
    }
}

function applyIdlePose(time) {
    // Breathing
    if (boneRefs.spine) {
        boneRefs.spine.rotation.x = restQuaternions.spine ? 0 : 0;
        var breathe = Math.sin(time * 1.8) * 0.012;
        boneRefs.spine.quaternion.copy(restQuaternions.spine || new THREE.Quaternion());
        boneRefs.spine.rotateX(breathe);
    }
    if (boneRefs.chest) {
        boneRefs.chest.quaternion.copy(restQuaternions.chest || new THREE.Quaternion());
        boneRefs.chest.rotateX(Math.sin(time * 1.8) * 0.006);
    }

    // Arms down from T-pose
    var armDown = new THREE.Quaternion();
    var armBendL = new THREE.Quaternion();
    var armBendR = new THREE.Quaternion();

    // Left arm: rotate around local Z by ~70 degrees to bring down
    armDown.setFromAxisAngle(new THREE.Vector3(0, 0, 1), 1.15 + Math.sin(time * 0.9) * 0.03);
    if (boneRefs.leftUpperArm) {
        boneRefs.leftUpperArm.quaternion.copy(restQuaternions.leftUpperArm || new THREE.Quaternion());
        boneRefs.leftUpperArm.quaternion.multiply(armDown);
        // Slight forward
        var fwd = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), 0.15);
        boneRefs.leftUpperArm.quaternion.multiply(fwd);
    }

    // Right arm: opposite Z rotation
    armDown.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -(1.15 + Math.sin(time * 0.9 + 0.5) * 0.03));
    if (boneRefs.rightUpperArm) {
        boneRefs.rightUpperArm.quaternion.copy(restQuaternions.rightUpperArm || new THREE.Quaternion());
        boneRefs.rightUpperArm.quaternion.multiply(armDown);
        var fwd2 = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), 0.15);
        boneRefs.rightUpperArm.quaternion.multiply(fwd2);
    }

    // Lower arms: slight bend inward
    armBendL.setFromAxisAngle(new THREE.Vector3(0, 1, 0), -0.25);
    if (boneRefs.leftLowerArm) {
        boneRefs.leftLowerArm.quaternion.copy(restQuaternions.leftLowerArm || new THREE.Quaternion());
        boneRefs.leftLowerArm.quaternion.multiply(armBendL);
    }
    armBendR.setFromAxisAngle(new THREE.Vector3(0, 1, 0), 0.25);
    if (boneRefs.rightLowerArm) {
        boneRefs.rightLowerArm.quaternion.copy(restQuaternions.rightLowerArm || new THREE.Quaternion());
        boneRefs.rightLowerArm.quaternion.multiply(armBendR);
    }

    // Subtle body sway
    if (boneRefs.hips) {
        boneRefs.hips.quaternion.copy(restQuaternions.hips || new THREE.Quaternion());
        var sway = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.sin(time * 0.5) * 0.015);
        boneRefs.hips.quaternion.multiply(sway);
    }
}

// ─── Load model ───
window.loadModel = function(url) {
    console.log('loadModel:', url);
    setStatus('Loading character...');
    document.getElementById('loader').style.display = 'block';

    if (currentVRM) { scene.remove(currentVRM.scene); currentVRM = null; }
    boneRefs = {};
    restQuaternions = {};

    var loader = new GLTFLoader();
    loader.register(function(parser) { return new VRM.VRMLoaderPlugin(parser); });

    loader.load(url, function(gltf) {
        var vrm = gltf.userData.vrm;
        if (!vrm) { sendEvent({ type: 'error', message: 'No VRM data' }); return; }

        currentVRM = vrm;
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);

        // Capture rest pose quaternions before we modify anything
        captureRestPose(vrm);

        // Camera: frame head and upper body
        camera.position.set(0, 1.35, 1.6);
        camera.lookAt(0, 1.2, 0);

        document.getElementById('loader').style.display = 'none';

        if (vrm.expressionManager) {
            var names = vrm.expressionManager.expressions.map(function(e) { return e.expressionName; });
            console.log('Expressions:', names.join(', '));
        }

        sendEvent({ type: 'loaded', model: url });
    }, function(progress) {
        if (progress.total > 0) {
            setStatus('Loading... ' + Math.round((progress.loaded / progress.total) * 100) + '%');
        }
    }, function(error) {
        console.error('Load error:', error);
        sendEvent({ type: 'error', message: error.message || 'Load failed' });
    });
};

// ─── Controls (called from Swift) ───
window.setEmotion = function(emotion) {
    emotionTargets = {};
    switch (emotion) {
        case 'happy': case 'excited': emotionTargets = { happy: 0.7 }; break;
        case 'sad': case 'concerned': emotionTargets = { sad: 0.6 }; break;
        case 'angry': emotionTargets = { angry: 0.7 }; break;
        case 'surprised': emotionTargets = { surprised: 0.8 }; break;
        default: break;
    }
};
window.setMouthOpenness = function(v) { targetMouth = Math.max(0, Math.min(1, v)); };
window.setBlink = function(b) { externalBlink = b; if (b) { targetBlinkL = 1; targetBlinkR = 1; } else { targetBlinkL = 0; targetBlinkR = 0; } };
window.setEyeGaze = function(x, y) { targetLookX = x; targetLookY = y; };
window.setHeadRotation = function(yaw, pitch) { targetHeadYaw = yaw * Math.PI / 180; targetHeadPitch = (pitch || 0) * Math.PI / 180; };
window.setBodyBounce = function(v) { targetBodyBounce = v; };

// ─── Animation loop ───
function animate() {
    requestAnimationFrame(animate);
    var delta = clock.getDelta();
    t += delta;

    if (!currentVRM) { renderer.render(scene, camera); return; }

    var mgr = currentVRM.expressionManager;
    var s = 10 * delta; // lerp speed

    // ── Expressions ──
    if (mgr) {
        // Lip sync
        mgr.setValue('aa', THREE.MathUtils.lerp(mgr.getValue('aa') || 0, targetMouth, s));

        // Auto-blink (when Swift isn't controlling it)
        if (!externalBlink) {
            if (blinkPhase === 0) {
                if (t >= nextBlinkTime) { blinkPhase = 1; }
            } else if (blinkPhase === 1) {
                blinkValue = Math.min(1, blinkValue + delta * 15);
                if (blinkValue >= 1) { blinkPhase = 2; }
            } else {
                blinkValue = Math.max(0, blinkValue - delta * 10);
                if (blinkValue <= 0) {
                    blinkPhase = 0;
                    nextBlinkTime = t + 2 + Math.random() * 4;
                }
            }
            mgr.setValue('blink', blinkValue);
        } else {
            mgr.setValue('blink', THREE.MathUtils.lerp(mgr.getValue('blink') || 0, targetBlinkL, s * 2));
        }

        // Emotions — smooth blend
        var allEmotions = ['happy', 'sad', 'angry', 'surprised', 'relaxed'];
        for (var i = 0; i < allEmotions.length; i++) {
            var e = allEmotions[i];
            var target = emotionTargets[e] || 0;
            var cur = mgr.getValue(e) || 0;
            mgr.setValue(e, THREE.MathUtils.lerp(cur, target, s * 0.3));
        }

        // Eye gaze
        mgr.setValue('lookRight', THREE.MathUtils.lerp(mgr.getValue('lookRight') || 0, Math.max(0, targetLookX), s));
        mgr.setValue('lookLeft', THREE.MathUtils.lerp(mgr.getValue('lookLeft') || 0, Math.max(0, -targetLookX), s));
        mgr.setValue('lookUp', THREE.MathUtils.lerp(mgr.getValue('lookUp') || 0, Math.max(0, targetLookY), s));
        mgr.setValue('lookDown', THREE.MathUtils.lerp(mgr.getValue('lookDown') || 0, Math.max(0, -targetLookY), s));
    }

    // ── Head rotation (on normalized bone — vrm.update will apply it) ──
    var headNorm = currentVRM.humanoid ? currentVRM.humanoid.getNormalizedBoneNode('head') : null;
    if (headNorm) {
        headNorm.rotation.y = THREE.MathUtils.lerp(headNorm.rotation.y, targetHeadYaw + Math.sin(t * 0.4) * 0.02, s);
        headNorm.rotation.x = THREE.MathUtils.lerp(headNorm.rotation.x, targetHeadPitch + Math.sin(t * 0.6) * 0.015, s);
        headNorm.rotation.z = Math.sin(t * 0.3) * 0.01; // subtle tilt
    }

    // Let VRM process normalized → raw
    currentVRM.update(delta);

    // ── AFTER vrm.update: apply arm pose on RAW bones ──
    applyIdlePose(t);

    // Body bounce
    if (targetBodyBounce > 0) {
        currentVRM.scene.position.y = Math.sin(t * 8) * 0.015 * targetBodyBounce;
    } else {
        currentVRM.scene.position.y *= 0.9;
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
sendEvent({ type: 'ready' });
</script>
</body>
</html>
