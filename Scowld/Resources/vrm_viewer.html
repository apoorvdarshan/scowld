<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
canvas { display: block; width: 100%; height: 100%; }
#loader {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; font-family: -apple-system, sans-serif; color: rgba(255,255,255,0.6);
}
#loader .spinner {
    width: 36px; height: 36px; margin: 0 auto 12px;
    border: 3px solid rgba(255,165,0,0.2); border-top-color: rgba(255,165,0,0.8);
    border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader .status { font-size: 13px; }
#error-display {
    position: absolute; bottom: 20px; left: 10px; right: 10px;
    font-family: monospace; font-size: 10px; color: #ff6666;
    background: rgba(0,0,0,0.7); padding: 8px; border-radius: 6px;
    max-height: 80px; overflow-y: auto; display: none;
}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><div class="status" id="status">Loading 3D engine...</div></div>
<div id="error-display" id="errors"></div>

<script>
// Error display helper
function showError(msg) {
    var el = document.getElementById('error-display');
    el.style.display = 'block';
    el.textContent += msg + '\n';
    document.getElementById('status').textContent = 'Error occurred';
}
function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}
</script>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRM from '@pixiv/three-vrm';

setStatus('Engine loaded. Waiting for model...');
console.log('Three.js and VRM loaded successfully');

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.35, 1.8);
camera.lookAt(0, 1.2, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
mainLight.position.set(1, 2, 3);
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xddeeff, 0.4);
fillLight.position.set(-1, 1, -1);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff8844, 0.3);
rimLight.position.set(0, 1, -2);
scene.add(rimLight);

// State
let currentVRM = null;
let clock = new THREE.Clock();
let targetMouth = 0;
let targetBlinkL = 0;
let targetBlinkR = 0;
let targetLookX = 0;
let targetLookY = 0;
let targetHeadYaw = 0;
let targetHeadPitch = 0;
let targetBodyBounce = 0;
let emotionTargets = {};
let idleTime = 0;

function sendEvent(obj) {
    try {
        window.webkit.messageHandlers.vrmEvent.postMessage(JSON.stringify(obj));
    } catch(e) {
        console.log('sendEvent failed:', e);
    }
}

// Load VRM model
window.loadModel = function(url) {
    console.log('loadModel called with:', url);
    setStatus('Loading character...');
    document.getElementById('loader').style.display = 'block';

    if (currentVRM) {
        scene.remove(currentVRM.scene);
        currentVRM = null;
    }

    const loader = new GLTFLoader();
    loader.register(function(parser) {
        return new VRM.VRMLoaderPlugin(parser);
    });

    loader.load(
        url,
        function(gltf) {
            console.log('GLTF loaded, extracting VRM...');
            const vrm = gltf.userData.vrm;
            if (!vrm) {
                showError('No VRM data in file');
                sendEvent({ type: 'error', message: 'No VRM data found in file' });
                return;
            }

            currentVRM = vrm;
            vrm.scene.rotation.y = Math.PI;
            scene.add(vrm.scene);

            // Adjust camera to fit model
            camera.position.set(0, 1.35, 1.8);
            camera.lookAt(0, 1.2, 0);

            // Hide loader
            document.getElementById('loader').style.display = 'none';

            console.log('VRM model loaded and added to scene');
            if (vrm.expressionManager) {
                var names = vrm.expressionManager.expressions.map(function(e) { return e.expressionName; });
                console.log('Available expressions:', names.join(', '));
            }

            sendEvent({ type: 'loaded', model: url });
        },
        function(progress) {
            if (progress.total > 0) {
                var pct = Math.round((progress.loaded / progress.total) * 100);
                setStatus('Loading character... ' + pct + '%');
            }
        },
        function(error) {
            console.error('VRM load error:', error);
            showError('Load failed: ' + (error.message || error));
            sendEvent({ type: 'error', message: error.message || 'Model load failed' });
        }
    );
};

// Control functions
window.setEmotion = function(emotion) {
    emotionTargets = {};
    switch (emotion) {
        case 'happy':
        case 'excited':
            emotionTargets = { happy: 0.8 };
            break;
        case 'sad':
        case 'concerned':
            emotionTargets = { sad: 0.7 };
            break;
        case 'angry':
            emotionTargets = { angry: 0.8 };
            break;
        case 'surprised':
            emotionTargets = { surprised: 0.9 };
            break;
        case 'thinking':
            emotionTargets = { neutral: 0.3 };
            break;
        default:
            emotionTargets = { neutral: 0.0 };
            break;
    }
};

window.setMouthOpenness = function(value) {
    targetMouth = Math.max(0, Math.min(1, value));
};

window.setBlink = function(blinking) {
    targetBlinkL = blinking ? 1 : 0;
    targetBlinkR = blinking ? 1 : 0;
};

window.setEyeGaze = function(x, y) {
    targetLookX = Math.max(-1, Math.min(1, x));
    targetLookY = Math.max(-1, Math.min(1, y));
};

window.setHeadRotation = function(yaw, pitch) {
    targetHeadYaw = yaw * (Math.PI / 180);
    targetHeadPitch = (pitch || 0) * (Math.PI / 180);
};

window.setBodyBounce = function(value) {
    targetBodyBounce = value;
};

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    var delta = clock.getDelta();
    idleTime += delta;

    if (currentVRM) {
        var mgr = currentVRM.expressionManager;
        var lerpSpeed = 8 * delta;

        if (mgr) {
            // Lip sync
            var curMouth = mgr.getValue('aa') || 0;
            mgr.setValue('aa', THREE.MathUtils.lerp(curMouth, targetMouth, lerpSpeed));

            // Blink
            var curBlinkL = mgr.getValue('blinkLeft') || 0;
            var curBlinkR = mgr.getValue('blinkRight') || 0;
            mgr.setValue('blinkLeft', THREE.MathUtils.lerp(curBlinkL, targetBlinkL, lerpSpeed * 2));
            mgr.setValue('blinkRight', THREE.MathUtils.lerp(curBlinkR, targetBlinkR, lerpSpeed * 2));

            // Emotions
            for (var name in emotionTargets) {
                var cur = mgr.getValue(name) || 0;
                mgr.setValue(name, THREE.MathUtils.lerp(cur, emotionTargets[name], lerpSpeed * 0.5));
            }
            var allEmotions = ['happy', 'sad', 'angry', 'surprised', 'neutral', 'relaxed'];
            for (var i = 0; i < allEmotions.length; i++) {
                var e = allEmotions[i];
                if (!(e in emotionTargets)) {
                    var cur = mgr.getValue(e) || 0;
                    if (cur > 0.01) {
                        mgr.setValue(e, THREE.MathUtils.lerp(cur, 0, lerpSpeed * 0.5));
                    }
                }
            }

            // Eye gaze
            var lookRight = Math.max(0, targetLookX);
            var lookLeft = Math.max(0, -targetLookX);
            var lookUp = Math.max(0, targetLookY);
            var lookDown = Math.max(0, -targetLookY);
            mgr.setValue('lookRight', THREE.MathUtils.lerp(mgr.getValue('lookRight') || 0, lookRight, lerpSpeed));
            mgr.setValue('lookLeft', THREE.MathUtils.lerp(mgr.getValue('lookLeft') || 0, lookLeft, lerpSpeed));
            mgr.setValue('lookUp', THREE.MathUtils.lerp(mgr.getValue('lookUp') || 0, lookUp, lerpSpeed));
            mgr.setValue('lookDown', THREE.MathUtils.lerp(mgr.getValue('lookDown') || 0, lookDown, lerpSpeed));
        }

        // Head bone rotation
        var head = currentVRM.humanoid ? currentVRM.humanoid.getRawBoneNode('head') : null;
        if (head) {
            head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetHeadYaw, lerpSpeed);
            head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetHeadPitch, lerpSpeed);
        }

        // Idle breathing
        var spine = currentVRM.humanoid ? currentVRM.humanoid.getRawBoneNode('spine') : null;
        if (spine) {
            spine.rotation.x = Math.sin(idleTime * 1.5) * 0.01;
        }

        // Body bounce
        if (targetBodyBounce > 0) {
            currentVRM.scene.position.y = Math.sin(idleTime * 8) * 0.02 * targetBodyBounce;
        } else {
            currentVRM.scene.position.y = THREE.MathUtils.lerp(currentVRM.scene.position.y, 0, lerpSpeed);
        }

        currentVRM.update(delta);
    }

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

// Notify Swift we're ready
console.log('Sending ready event to Swift');
sendEvent({ type: 'ready' });
</script>
</body>
</html>
