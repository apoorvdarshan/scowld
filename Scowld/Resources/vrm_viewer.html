<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRM from '@pixiv/three-vrm';

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.35, 1.8);
camera.lookAt(0, 1.2, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
mainLight.position.set(1, 2, 3);
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xddeeff, 0.4);
fillLight.position.set(-1, 1, -1);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff8844, 0.3);
rimLight.position.set(0, 1, -2);
scene.add(rimLight);

// State
let currentVRM = null;
let clock = new THREE.Clock();

// Smooth interpolation targets
let targetMouth = 0;
let targetBlinkL = 0;
let targetBlinkR = 0;
let targetLookX = 0;
let targetLookY = 0;
let targetHeadYaw = 0;
let targetHeadPitch = 0;
let targetBodyBounce = 0;

// Current emotion blend shape targets
let emotionTargets = {};

// Idle animation state
let idleTime = 0;

// VRM blend shape mapping (handles both VRM 0.x and 1.0 naming)
function setExpression(name, value) {
    if (!currentVRM) return;
    const mgr = currentVRM.expressionManager;
    if (!mgr) return;
    mgr.setValue(name, value);
}

// Load VRM model
window.loadModel = function(url) {
    if (currentVRM) {
        scene.remove(currentVRM.scene);
        currentVRM = null;
    }

    const loader = new GLTFLoader();
    loader.register((parser) => new VRM.VRMLoaderPlugin(parser));

    loader.load(url, (gltf) => {
        const vrm = gltf.userData.vrm;
        if (!vrm) {
            window.webkit?.messageHandlers?.vrmEvent?.postMessage(
                JSON.stringify({ type: 'error', message: 'No VRM data found' })
            );
            return;
        }

        currentVRM = vrm;

        // Rotate to face camera (VRM models face +Z by default)
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);

        // Reset camera for this model
        camera.position.set(0, 1.35, 1.8);
        camera.lookAt(0, 1.2, 0);

        window.webkit?.messageHandlers?.vrmEvent?.postMessage(
            JSON.stringify({ type: 'loaded', model: url })
        );
    }, undefined, (error) => {
        window.webkit?.messageHandlers?.vrmEvent?.postMessage(
            JSON.stringify({ type: 'error', message: error.message || 'Load failed' })
        );
    });
};

// Set emotion (maps app emotions to VRM expressions)
window.setEmotion = function(emotion) {
    emotionTargets = {};
    switch (emotion) {
        case 'happy':
        case 'excited':
            emotionTargets = { happy: 0.8 };
            break;
        case 'sad':
        case 'concerned':
            emotionTargets = { sad: 0.7 };
            break;
        case 'angry':
            emotionTargets = { angry: 0.8 };
            break;
        case 'surprised':
            emotionTargets = { surprised: 0.9 };
            break;
        case 'thinking':
            emotionTargets = { neutral: 0.3 };
            break;
        default:
            emotionTargets = { neutral: 0.0 };
            break;
    }
};

// Set mouth openness for lip sync (0-1)
window.setMouthOpenness = function(value) {
    targetMouth = Math.max(0, Math.min(1, value));
};

// Set blink state
window.setBlink = function(blinking) {
    targetBlinkL = blinking ? 1 : 0;
    targetBlinkR = blinking ? 1 : 0;
};

// Set eye gaze direction (-1 to 1 for both axes)
window.setEyeGaze = function(x, y) {
    targetLookX = Math.max(-1, Math.min(1, x));
    targetLookY = Math.max(-1, Math.min(1, y));
};

// Set head rotation (degrees)
window.setHeadRotation = function(yaw, pitch) {
    targetHeadYaw = yaw * (Math.PI / 180);
    targetHeadPitch = (pitch || 0) * (Math.PI / 180);
};

// Set body bounce (0 or 1)
window.setBodyBounce = function(value) {
    targetBodyBounce = value;
};

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    idleTime += delta;

    if (currentVRM) {
        const mgr = currentVRM.expressionManager;
        const lerpSpeed = 8 * delta;

        if (mgr) {
            // Lip sync — map openness to "aa" expression
            const currentMouth = mgr.getValue('aa') || 0;
            mgr.setValue('aa', THREE.MathUtils.lerp(currentMouth, targetMouth, lerpSpeed));

            // Blink
            const currentBlinkL = mgr.getValue('blinkLeft') || 0;
            const currentBlinkR = mgr.getValue('blinkRight') || 0;
            mgr.setValue('blinkLeft', THREE.MathUtils.lerp(currentBlinkL, targetBlinkL, lerpSpeed * 2));
            mgr.setValue('blinkRight', THREE.MathUtils.lerp(currentBlinkR, targetBlinkR, lerpSpeed * 2));

            // Emotion blend shapes
            for (const [name, target] of Object.entries(emotionTargets)) {
                const current = mgr.getValue(name) || 0;
                mgr.setValue(name, THREE.MathUtils.lerp(current, target, lerpSpeed * 0.5));
            }
            // Fade out emotions not in current target
            const allEmotions = ['happy', 'sad', 'angry', 'surprised', 'neutral', 'relaxed'];
            for (const e of allEmotions) {
                if (!(e in emotionTargets)) {
                    const current = mgr.getValue(e) || 0;
                    if (current > 0.01) {
                        mgr.setValue(e, THREE.MathUtils.lerp(current, 0, lerpSpeed * 0.5));
                    }
                }
            }

            // Eye gaze via lookLeft/lookRight/lookUp/lookDown
            const lookRight = Math.max(0, targetLookX);
            const lookLeft = Math.max(0, -targetLookX);
            const lookUp = Math.max(0, targetLookY);
            const lookDown = Math.max(0, -targetLookY);
            mgr.setValue('lookRight', THREE.MathUtils.lerp(mgr.getValue('lookRight') || 0, lookRight, lerpSpeed));
            mgr.setValue('lookLeft', THREE.MathUtils.lerp(mgr.getValue('lookLeft') || 0, lookLeft, lerpSpeed));
            mgr.setValue('lookUp', THREE.MathUtils.lerp(mgr.getValue('lookUp') || 0, lookUp, lerpSpeed));
            mgr.setValue('lookDown', THREE.MathUtils.lerp(mgr.getValue('lookDown') || 0, lookDown, lerpSpeed));
        }

        // Head bone rotation
        const head = currentVRM.humanoid?.getRawBoneNode('head');
        if (head) {
            head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetHeadYaw, lerpSpeed);
            head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetHeadPitch, lerpSpeed);
        }

        // Idle breathing animation on spine
        const spine = currentVRM.humanoid?.getRawBoneNode('spine');
        if (spine) {
            const breathe = Math.sin(idleTime * 1.5) * 0.01;
            spine.rotation.x = breathe;
        }

        // Body bounce
        if (targetBodyBounce > 0) {
            const bounce = Math.sin(idleTime * 8) * 0.02 * targetBodyBounce;
            currentVRM.scene.position.y = bounce;
        } else {
            currentVRM.scene.position.y = THREE.MathUtils.lerp(currentVRM.scene.position.y, 0, lerpSpeed);
        }

        currentVRM.update(delta);
    }

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

// Notify Swift we're ready
window.webkit?.messageHandlers?.vrmEvent?.postMessage(
    JSON.stringify({ type: 'ready' })
);
</script>
</body>
</html>
