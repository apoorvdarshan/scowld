<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
canvas { display: block; width: 100%; height: 100%; }
#loader {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; font-family: -apple-system, sans-serif; color: rgba(255,255,255,0.6);
}
#loader .spinner {
    width: 36px; height: 36px; margin: 0 auto 12px;
    border: 3px solid rgba(255,165,0,0.2); border-top-color: rgba(255,165,0,0.8);
    border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loader .status { font-size: 13px; }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><div class="status" id="status">Loading 3D engine...</div></div>

<script>
function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js",
        "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3.3.3/lib/three-vrm-animation.module.min.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRM from '@pixiv/three-vrm';
import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

setStatus('Engine loaded. Waiting for model...');

// ─── Scene ───
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(22, window.innerWidth / window.innerHeight, 0.1, 100);
var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

// ─── Lighting ───
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
var mainLight = new THREE.DirectionalLight(0xffeedd, 1.3);
mainLight.position.set(1, 2, 3);
scene.add(mainLight);
scene.add(new THREE.DirectionalLight(0xddeeff, 0.5).translateOnAxis(new THREE.Vector3(-1, 1, -1).normalize(), 3));
var rimLight = new THREE.DirectionalLight(0xffaa66, 0.4);
rimLight.position.set(0, 0.5, -2);
scene.add(rimLight);

// ─── State ───
var currentVRM = null;
var mixer = null;
var clock = new THREE.Clock();
var t = 0;

// Animation library: name → VRMAnimation
var animationLib = {};
var idleAction = null;
var currentAction = null;

// Targets from Swift
var targetMouth = 0;
var targetLookX = 0, targetLookY = 0;
var targetHeadYaw = 0, targetHeadPitch = 0;
var targetBodyBounce = 0;
var emotionTargets = {};

// Auto-blink
var nextBlinkTime = 2 + Math.random() * 3;
var blinkPhase = 0;
var blinkValue = 0;
var externalBlink = false;

function sendEvent(obj) {
    try { window.webkit.messageHandlers.vrmEvent.postMessage(JSON.stringify(obj)); } catch(e) {}
}

// ─── Animation loader ───
var animLoader = new GLTFLoader();
animLoader.register(function(parser) { return new VRMAnimationLoaderPlugin(parser); });

function loadAnimation(name, url) {
    return new Promise(function(resolve, reject) {
        animLoader.load(url, function(gltf) {
            var vrmAnims = gltf.userData.vrmAnimations;
            if (vrmAnims && vrmAnims.length > 0) {
                animationLib[name] = vrmAnims[0];
                console.log('Animation loaded: ' + name);
                resolve(vrmAnims[0]);
            } else {
                console.warn('No VRM animation in: ' + name);
                reject('No animation data');
            }
        }, null, function(err) {
            console.error('Failed to load animation ' + name + ':', err);
            reject(err);
        });
    });
}

function playAnimationClip(name, loop) {
    if (!currentVRM || !mixer) return;
    var vrmAnim = animationLib[name];
    if (!vrmAnim) { console.warn('Animation not loaded: ' + name); return; }

    var clip = createVRMAnimationClip(vrmAnim, currentVRM);
    var action = mixer.clipAction(clip);

    if (loop) {
        action.setLoop(THREE.LoopRepeat);
    } else {
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;
    }

    if (currentAction && currentAction !== idleAction) {
        currentAction.fadeOut(0.5);
    }

    action.reset().fadeIn(0.5).play();
    currentAction = action;

    if (!loop) {
        // When one-shot animation finishes, crossfade back to idle
        var onFinished = function(e) {
            if (e.action === action) {
                mixer.removeEventListener('finished', onFinished);
                action.fadeOut(0.5);
                if (idleAction) {
                    idleAction.reset().fadeIn(0.5).play();
                    currentAction = idleAction;
                }
            }
        };
        mixer.addEventListener('finished', onFinished);
    }

    return action;
}

// ─── Load VRM model ───
window.loadModel = function(url) {
    console.log('loadModel:', url);
    setStatus('Loading character...');
    document.getElementById('loader').style.display = 'block';

    if (currentVRM) { scene.remove(currentVRM.scene); currentVRM = null; }
    if (mixer) { mixer.stopAllAction(); mixer = null; }
    idleAction = null;
    currentAction = null;

    var loader = new GLTFLoader();
    loader.register(function(parser) { return new VRM.VRMLoaderPlugin(parser); });

    loader.load(url, function(gltf) {
        var vrm = gltf.userData.vrm;
        if (!vrm) { sendEvent({ type: 'error', message: 'No VRM data' }); return; }

        currentVRM = vrm;
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);

        // Create animation mixer
        mixer = new THREE.AnimationMixer(vrm.scene);

        // Camera: full body
        camera.position.set(0, 1.0, 2.8);
        camera.lookAt(0, 0.85, 0);

        document.getElementById('loader').style.display = 'none';

        if (vrm.expressionManager) {
            var names = vrm.expressionManager.expressions.map(function(e) { return e.expressionName; });
            console.log('Expressions:', names.join(', '));
        }

        // Load idle animation and start playing
        loadIdleAnimation();

        sendEvent({ type: 'loaded', model: url });
    }, function(progress) {
        if (progress.total > 0) {
            setStatus('Loading... ' + Math.round((progress.loaded / progress.total) * 100) + '%');
        }
    }, function(error) {
        console.error('Load error:', error);
        sendEvent({ type: 'error', message: error.message || 'Load failed' });
    });
};

function loadIdleAnimation() {
    // Find idle_loop.vrma in bundle
    var basePath = document.baseURI.replace(/\/[^\/]*$/, '');
    var idleURL = basePath + '/animations/idle_loop.vrma';
    console.log('Loading idle from:', idleURL);

    loadAnimation('idle_loop', idleURL).then(function() {
        idleAction = playAnimationClip('idle_loop', true);
        currentAction = idleAction;
        console.log('Idle animation playing');

        // Preload other animations in background
        var anims = ['greeting', 'dance', 'peaceSign', 'modelPose', 'shoot', 'showFullBody', 'spin', 'squat'];
        anims.forEach(function(name) {
            var animURL = basePath + '/animations/' + name + '.vrma';
            loadAnimation(name, animURL).catch(function() {});
        });
    }).catch(function(err) {
        console.warn('Idle animation not found, using static pose:', err);
    });
}

// ─── Controls from Swift ───
window.setEmotion = function(emotion) {
    emotionTargets = {};
    switch (emotion) {
        case 'happy': case 'excited': emotionTargets = { happy: 0.7 }; break;
        case 'sad': case 'concerned': emotionTargets = { sad: 0.6 }; break;
        case 'angry': emotionTargets = { angry: 0.7 }; break;
        case 'surprised': emotionTargets = { surprised: 0.8 }; break;
        default: break;
    }
};

window.setMouthOpenness = function(v) { targetMouth = Math.max(0, Math.min(1, v)); };

window.setBlink = function(b) {
    externalBlink = b;
};

window.setEyeGaze = function(x, y) { targetLookX = x; targetLookY = y; };

window.setHeadRotation = function(yaw, pitch) {
    targetHeadYaw = yaw * Math.PI / 180;
    targetHeadPitch = (pitch || 0) * Math.PI / 180;
};

window.setBodyBounce = function(v) { targetBodyBounce = v; };

window.playGesture = function(name, duration) {
    // Map gesture names to animation names
    var animMap = {
        'wave': 'greeting',
        'greeting': 'greeting',
        'dance': 'dance',
        'peace': 'peaceSign',
        'pose': 'modelPose',
        'shoot': 'shoot',
        'show': 'showFullBody',
        'spin': 'spin',
        'squat': 'squat',
        'happy': 'dance',
        'nod': null,
        'shake': null,
        'think': null,
        'sad': null,
        'bow': null
    };

    var animName = animMap[name];
    if (animName && animationLib[animName]) {
        playAnimationClip(animName, false);
        console.log('Playing VRMA animation: ' + animName);
    } else {
        // Fallback to procedural gesture for ones without VRMA
        playProceduralGesture(name, duration || 2.0);
    }
};

// ─── Procedural gestures (fallback for animations without VRMA files) ───
var procGesture = null;
var procStartTime = 0;
var procDuration = 0;

function playProceduralGesture(name, duration) {
    procGesture = name;
    procStartTime = t;
    procDuration = duration;
}

function applyProceduralGesture() {
    if (!procGesture || !currentVRM) return;
    var elapsed = t - procStartTime;
    var p = Math.min(1, elapsed / procDuration);
    if (p >= 1) { procGesture = null; return; }

    var humanoid = currentVRM.humanoid;
    if (!humanoid) return;

    var head = humanoid.getRawBoneNode('head');
    if (procGesture === 'nod' && head) {
        head.rotateX(Math.sin(p * Math.PI * 4) * 0.12 * Math.sin(p * Math.PI));
    } else if (procGesture === 'shake' && head) {
        head.rotateY(Math.sin(p * Math.PI * 5) * 0.15 * Math.sin(p * Math.PI));
    } else if (procGesture === 'think' && head) {
        var hold = p < 0.2 ? p / 0.2 : (p > 0.8 ? (1 - p) / 0.2 : 1);
        head.rotateZ(0.08 * Math.min(1, Math.max(0, hold)));
        head.rotateX(-0.05 * Math.min(1, Math.max(0, hold)));
    } else if (procGesture === 'sad') {
        var droop = Math.sin(p * Math.PI);
        var spine = humanoid.getRawBoneNode('spine');
        if (spine) spine.rotateX(0.05 * droop);
        if (head) head.rotateX(0.1 * droop);
    } else if (procGesture === 'bow') {
        var bowAmt = Math.sin(p * Math.PI);
        var spine = humanoid.getRawBoneNode('spine');
        if (spine) spine.rotateX(0.15 * bowAmt);
        if (head) head.rotateX(0.08 * bowAmt);
    }
}

// ─── Animation loop ───
function animate() {
    requestAnimationFrame(animate);
    var delta = clock.getDelta();
    t += delta;

    if (!currentVRM) { renderer.render(scene, camera); return; }

    var mgr = currentVRM.expressionManager;
    var s = 10 * delta;

    // ── Expressions ──
    if (mgr) {
        // Lip sync
        mgr.setValue('aa', THREE.MathUtils.lerp(mgr.getValue('aa') || 0, targetMouth, s));

        // Auto-blink
        if (!externalBlink) {
            if (blinkPhase === 0) {
                if (t >= nextBlinkTime) blinkPhase = 1;
            } else if (blinkPhase === 1) {
                blinkValue = Math.min(1, blinkValue + delta * 15);
                if (blinkValue >= 1) blinkPhase = 2;
            } else {
                blinkValue = Math.max(0, blinkValue - delta * 10);
                if (blinkValue <= 0) { blinkPhase = 0; nextBlinkTime = t + 2 + Math.random() * 4; }
            }
            mgr.setValue('blink', blinkValue);
        }

        // Emotions
        var allEmotions = ['happy', 'sad', 'angry', 'surprised', 'relaxed'];
        for (var i = 0; i < allEmotions.length; i++) {
            var e = allEmotions[i];
            mgr.setValue(e, THREE.MathUtils.lerp(mgr.getValue(e) || 0, emotionTargets[e] || 0, s * 0.3));
        }

        // Eye gaze
        mgr.setValue('lookRight', THREE.MathUtils.lerp(mgr.getValue('lookRight') || 0, Math.max(0, targetLookX), s));
        mgr.setValue('lookLeft', THREE.MathUtils.lerp(mgr.getValue('lookLeft') || 0, Math.max(0, -targetLookX), s));
        mgr.setValue('lookUp', THREE.MathUtils.lerp(mgr.getValue('lookUp') || 0, Math.max(0, targetLookY), s));
        mgr.setValue('lookDown', THREE.MathUtils.lerp(mgr.getValue('lookDown') || 0, Math.max(0, -targetLookY), s));
    }

    // Head micro-movements (on normalized bone, before vrm.update)
    var headNorm = currentVRM.humanoid ? currentVRM.humanoid.getNormalizedBoneNode('head') : null;
    if (headNorm) {
        headNorm.rotation.y = THREE.MathUtils.lerp(headNorm.rotation.y, targetHeadYaw + Math.sin(t * 0.4) * 0.015, s * 0.5);
        headNorm.rotation.x = THREE.MathUtils.lerp(headNorm.rotation.x, targetHeadPitch + Math.sin(t * 0.6) * 0.01, s * 0.5);
    }

    // Update VRM (processes normalized → raw)
    currentVRM.update(delta);

    // Update animation mixer (applies VRMA keyframes to raw bones)
    if (mixer) mixer.update(delta);

    // Apply procedural gestures on top
    applyProceduralGesture();

    // Body bounce
    if (targetBodyBounce > 0) {
        currentVRM.scene.position.y = Math.sin(t * 8) * 0.015 * targetBodyBounce;
    } else {
        currentVRM.scene.position.y *= 0.9;
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
sendEvent({ type: 'ready' });
</script>
</body>
</html>
